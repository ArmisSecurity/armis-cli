name: 'Armis Security Scanner'
description: 'Enterprise-grade security scanning for repositories and container images with Armis Cloud'
author: 'Armis Security'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  scan-type:
    description: 'Type of scan to perform: repo or image'
    required: true
  scan-target:
    description: 'Target to scan (path for repo, image name for image scan)'
    required: false
    default: '.'
  client-id:
    description: 'Client ID for JWT authentication (recommended)'
    required: false
  client-secret:
    description: 'Client secret for JWT authentication (recommended)'
    required: false
  region:
    description: 'Armis cloud region for JWT authentication'
    required: false
    default: ''
  api-token:
    description: 'Armis API token for Basic authentication (legacy)'
    required: false
  tenant-id:
    description: 'Tenant identifier for Armis Cloud (legacy, not needed with JWT)'
    required: false
  format:
    description: 'Output format: human, json, sarif, junit'
    required: false
    default: 'sarif'
  fail-on:
    description: 'Comma-separated severity levels to fail on (e.g., HIGH,CRITICAL). Empty string for informational mode (never fail).'
    required: false
    default: ''
  exit-code:
    description: 'Exit code to return when build fails'
    required: false
    default: '1'
  no-progress:
    description: 'Disable progress indicators'
    required: false
    default: 'true'
  image-tarball:
    description: 'Path to image tarball (only for image scans)'
    required: false
  output-file:
    description: 'File path to write scan results (optional)'
    required: false
  scan-timeout:
    description: 'Scan timeout in minutes'
    required: false
    default: '60'
  include-files:
    description: 'Comma-separated list of file paths to scan (relative to repository root)'
    required: false
    default: ''
  build-from-source:
    description: 'Build CLI from source instead of downloading release (for testing)'
    required: false
    default: 'false'
  pr-comment:
    description: 'Post a branded PR comment via the Armis backend (requires the armis-appsec GitHub App installed on the repo). Only runs on pull_request events.'
    required: false
    default: 'false'
  api-url:
    description: 'Override the Armis API base URL (advanced; defaults to region-derived or production). Equivalent to ARMIS_API_URL.'
    required: false
    default: ''

outputs:
  results:
    description: 'Scan results in the specified format'
    value: ${{ steps.scan.outputs.results }}
  exit-code:
    description: 'Exit code from the scan'
    value: ${{ steps.scan.outputs.exit-code }}

runs:
  using: 'composite'
  steps:
    - name: Setup Go
      if: inputs.build-from-source == 'true'
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    - name: Build Armis CLI from source
      if: inputs.build-from-source == 'true'
      shell: bash
      run: |
        echo "Building Armis CLI from source..."
        go build -o armis-cli ./cmd/armis-cli
        mkdir -p "$HOME/.local/bin"
        mv armis-cli "$HOME/.local/bin/"
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Install Armis CLI from release
      if: inputs.build-from-source != 'true'
      shell: bash
      run: |
        echo "Installing Armis CLI..."

        # Detect OS and architecture
        OS=$(uname -s | tr '[:upper:]' '[:lower:]')
        case "$OS" in
          linux*)  OS="linux" ;;
          darwin*) OS="darwin" ;;
          *)       echo "Error: Unsupported OS: $OS"; exit 1 ;;
        esac

        ARCH=$(uname -m)
        case "$ARCH" in
          x86_64|amd64) ARCH="amd64" ;;
          aarch64|arm64) ARCH="arm64" ;;
          *)            echo "Error: Unsupported architecture: $ARCH"; exit 1 ;;
        esac

        # Download binary directly from GitHub releases
        REPO="ArmisSecurity/armis-cli"
        ARCHIVE_NAME="armis-cli-${OS}-${ARCH}.tar.gz"
        CHECKSUMS_NAME="armis-cli-checksums.txt"
        BASE_URL="https://github.com/${REPO}/releases/latest/download"

        TMP_DIR=$(mktemp -d)
        trap 'rm -rf "$TMP_DIR"' EXIT

        echo "Downloading $ARCHIVE_NAME..."
        curl -fsSL "${BASE_URL}/${ARCHIVE_NAME}" -o "${TMP_DIR}/${ARCHIVE_NAME}"
        curl -fsSL "${BASE_URL}/${CHECKSUMS_NAME}" -o "${TMP_DIR}/${CHECKSUMS_NAME}"

        # Verify checksum
        echo "Verifying checksum..."
        cd "$TMP_DIR"
        EXPECTED=$(grep " ${ARCHIVE_NAME}$" "$CHECKSUMS_NAME" | awk '{print $1}')
        if command -v sha256sum > /dev/null 2>&1; then
          ACTUAL=$(sha256sum "$ARCHIVE_NAME" | awk '{print $1}')
        else
          ACTUAL=$(shasum -a 256 "$ARCHIVE_NAME" | awk '{print $1}')
        fi

        if [ "$EXPECTED" != "$ACTUAL" ]; then
          echo "Error: Checksum verification failed!"
          echo "Expected: $EXPECTED"
          echo "Actual:   $ACTUAL"
          exit 1
        fi
        echo "Checksum verified successfully"

        # Extract and install
        tar -xzf "$ARCHIVE_NAME"
        mkdir -p "$HOME/.local/bin"
        mv armis-cli "$HOME/.local/bin/"
        chmod +x "$HOME/.local/bin/armis-cli"
        echo "Armis CLI installed successfully"
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Verify Installation
      shell: bash
      run: |
        armis-cli --version

    - name: Run Security Scan
      id: scan
      shell: bash
      env:
        INPUT_CLIENT_ID: ${{ inputs.client-id }}
        INPUT_CLIENT_SECRET: ${{ inputs.client-secret }}
        INPUT_REGION: ${{ inputs.region }}
        INPUT_API_TOKEN: ${{ inputs.api-token }}
        INPUT_TENANT_ID: ${{ inputs.tenant-id }}
        INPUT_API_URL: ${{ inputs.api-url }}
        SCAN_TYPE: ${{ inputs.scan-type }}
        SCAN_TARGET: ${{ inputs.scan-target }}
        OUTPUT_FORMAT: ${{ inputs.format }}
        FAIL_ON: ${{ inputs.fail-on }}
        EXIT_CODE_VAL: ${{ inputs.exit-code }}
        SCAN_TIMEOUT: ${{ inputs.scan-timeout }}
        NO_PROGRESS: ${{ inputs.no-progress }}
        IMAGE_TARBALL: ${{ inputs.image-tarball }}
        OUTPUT_FILE: ${{ inputs.output-file }}
        INCLUDE_FILES: ${{ inputs.include-files }}
      run: |
        set +e

        # Set ARMIS_* env vars only when inputs are non-empty (avoids overriding job/step-level env)
        if [ -n "$INPUT_CLIENT_ID" ]; then export ARMIS_CLIENT_ID="$INPUT_CLIENT_ID"; fi
        if [ -n "$INPUT_CLIENT_SECRET" ]; then export ARMIS_CLIENT_SECRET="$INPUT_CLIENT_SECRET"; fi
        if [ -n "$INPUT_REGION" ]; then export ARMIS_REGION="$INPUT_REGION"; fi
        if [ -n "$INPUT_API_TOKEN" ]; then export ARMIS_API_TOKEN="$INPUT_API_TOKEN"; fi
        if [ -n "$INPUT_TENANT_ID" ]; then export ARMIS_TENANT_ID="$INPUT_TENANT_ID"; fi
        if [ -n "$INPUT_API_URL" ]; then export ARMIS_API_URL="$INPUT_API_URL"; fi

        # Validate authentication: require JWT (client-id + client-secret) OR Basic (api-token + tenant-id)
        if [ -n "$ARMIS_CLIENT_ID" ] && [ -z "$ARMIS_CLIENT_SECRET" ]; then
          echo "Error: 'client-id' provided without 'client-secret'. Both are required for JWT authentication."
          exit 1
        fi
        if [ -z "$ARMIS_CLIENT_ID" ] && [ -n "$ARMIS_CLIENT_SECRET" ]; then
          echo "Error: 'client-secret' provided without 'client-id'. Both are required for JWT authentication."
          exit 1
        fi
        # Only validate Basic auth pairing when JWT is not configured (JWT takes precedence)
        if [ -z "$ARMIS_CLIENT_ID" ]; then
          if [ -n "$ARMIS_API_TOKEN" ] && [ -z "$ARMIS_TENANT_ID" ]; then
            echo "Error: 'api-token' provided without 'tenant-id'. Both are required for Basic authentication."
            exit 1
          fi
          if [ -z "$ARMIS_API_TOKEN" ] && [ -n "$ARMIS_TENANT_ID" ]; then
            echo "Error: 'tenant-id' provided without 'api-token'. Both are required for Basic authentication."
            exit 1
          fi
          if [ -z "$ARMIS_API_TOKEN" ]; then
            echo "Error: No authentication provided. Set 'client-id' + 'client-secret' (recommended) or 'api-token' + 'tenant-id' (legacy)."
            exit 1
          fi
        fi

        # Validate scan-type to prevent injection
        if [[ "$SCAN_TYPE" != "repo" && "$SCAN_TYPE" != "image" ]]; then
          echo "Error: Invalid scan-type '$SCAN_TYPE'. Must be 'repo' or 'image'."
          exit 1
        fi

        # Build command arguments array for safe execution
        SCAN_ARGS=("scan" "$SCAN_TYPE" "$SCAN_TARGET")
        if [ -n "$ARMIS_TENANT_ID" ] && [ -z "$ARMIS_CLIENT_ID" ]; then
          SCAN_ARGS+=("--tenant-id" "$ARMIS_TENANT_ID")
        fi
        SCAN_ARGS+=("--format" "$OUTPUT_FORMAT")

        if [ -n "$FAIL_ON" ]; then
          SCAN_ARGS+=("--fail-on" "$FAIL_ON")
        fi

        SCAN_ARGS+=("--exit-code" "$EXIT_CODE_VAL")
        SCAN_ARGS+=("--scan-timeout" "$SCAN_TIMEOUT")

        if [ "$NO_PROGRESS" = "true" ]; then
          SCAN_ARGS+=("--no-progress")
        fi

        if [ "$SCAN_TYPE" = "image" ] && [ -n "$IMAGE_TARBALL" ]; then
          SCAN_ARGS+=("--tarball" "$IMAGE_TARBALL")
        fi

        if [ -n "$INCLUDE_FILES" ]; then
          SCAN_ARGS+=("--include-files" "$INCLUDE_FILES")
        fi

        # Execute command safely without eval
        if [ -n "$OUTPUT_FILE" ]; then
          armis-cli "${SCAN_ARGS[@]}" > "$OUTPUT_FILE"
          SCAN_EXIT_CODE=$?
          SCAN_RESULTS=$(cat "$OUTPUT_FILE")
        else
          SCAN_RESULTS=$(armis-cli "${SCAN_ARGS[@]}")
          SCAN_EXIT_CODE=$?
        fi

        echo "exit-code=$SCAN_EXIT_CODE" >> $GITHUB_OUTPUT

        # For multiline output, use heredoc
        echo "results<<EOF" >> $GITHUB_OUTPUT
        echo "$SCAN_RESULTS" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

        exit $SCAN_EXIT_CODE

    - name: Post Branded PR Comment
      # Only on pull requests when explicitly enabled. Requires the armis-appsec
      # GitHub App installed on the target repo (server-side branded comment).
      # always() so the comment is still posted when the scan step exits non-zero
      # (e.g. findings exceeded --fail-on), matching the prior workflow behavior.
      if: always() && inputs.pr-comment == 'true' && github.event_name == 'pull_request'
      shell: bash
      env:
        INPUT_CLIENT_ID: ${{ inputs.client-id }}
        INPUT_CLIENT_SECRET: ${{ inputs.client-secret }}
        INPUT_API_TOKEN: ${{ inputs.api-token }}
        INPUT_REGION: ${{ inputs.region }}
        INPUT_API_URL: ${{ inputs.api-url }}
        INPUT_OUTPUT_FILE: ${{ inputs.output-file }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_EVENT_PATH: ${{ github.event_path }}
      run: |
        # Commenting must NEVER fail the build: soft-fail everywhere (warn + exit 0).
        set +e

        warn() { echo "::warning::Armis branded PR comment skipped: $1"; exit 0; }

        # 1. Resolve API base URL: ARMIS_API_URL/api-url override -> region -> production.
        # The base URL comes from operator-controlled action config (not PR content);
        # we still require HTTPS for ALL base URLs so the credential sent below can
        # never traverse plaintext. This is stricter than the CLI's NewAuthClient,
        # which additionally permits http://localhost / http://127.0.0.1 for local
        # development — an exception that has no use case in CI.
        # armis:ignore cwe:918 reason:BASE_URL is operator config (api-url/ARMIS_API_URL/region), HTTPS-enforced; not derived from untrusted request data
        BASE_URL="${INPUT_API_URL:-${ARMIS_API_URL:-}}"
        if [ -z "$BASE_URL" ]; then
          if [ -n "$INPUT_REGION" ]; then
            if echo "$INPUT_REGION" | grep -Eq '^[a-z0-9]([a-z0-9-]*[a-z0-9])?$'; then
              BASE_URL="https://moose.${INPUT_REGION}.armis.com"
            else
              warn "invalid region '$INPUT_REGION'"
            fi
          else
            BASE_URL="https://moose.armis.com"
          fi
        fi
        BASE_URL="${BASE_URL%/}"
        # armis:ignore cwe:918 reason:BASE_URL is operator config (api-url/ARMIS_API_URL/region), HTTPS-enforced here; not derived from untrusted request data
        case "$BASE_URL" in
          https://*) ;;
          *) warn "API base URL must use HTTPS (got '${BASE_URL%%:*}://...')" ;;
        esac

        # 2. Locate the SARIF file produced by the scan step.
        SARIF_FILE="${INPUT_OUTPUT_FILE:-armis-results.sarif}"
        if [ ! -s "$SARIF_FILE" ]; then
          warn "SARIF file '$SARIF_FILE' is missing or empty"
        fi
        if ! jq -e '.runs' "$SARIF_FILE" > /dev/null 2>&1; then
          warn "SARIF file '$SARIF_FILE' has no 'runs' key"
        fi

        # 3. Resolve repo and PR number (composite actions lack github.event.* context).
        REPO="$GITHUB_REPOSITORY"
        if ! echo "$REPO" | grep -Eq '^[A-Za-z0-9._-]+/[A-Za-z0-9._-]+$'; then
          warn "unexpected repository name '$REPO'"
        fi
        PR_NUMBER=$(jq -r '.pull_request.number // empty' "$GITHUB_EVENT_PATH" 2>/dev/null)
        if ! echo "$PR_NUMBER" | grep -Eq '^[1-9][0-9]*$'; then
          warn "could not determine pull request number"
        fi

        # 4. Build the Authorization header.
        #    Prefer JWT (exchange client-id/secret); fall back to Basic api-token.
        AUTH=""
        if [ -n "$INPUT_CLIENT_ID" ] && [ -n "$INPUT_CLIENT_SECRET" ]; then
          # Write the credential payload to a private file and send it via @file so the
          # client secret never appears on the curl command line (process list / /proc).
          TOKEN_REQ_FILE=$(mktemp)
          chmod 600 "$TOKEN_REQ_FILE"
          if [ -n "$INPUT_REGION" ]; then
            jq -n --arg id "$INPUT_CLIENT_ID" --arg secret "$INPUT_CLIENT_SECRET" --arg region "$INPUT_REGION" \
              '{client_id:$id, client_secret:$secret, region:$region}' > "$TOKEN_REQ_FILE"
          else
            jq -n --arg id "$INPUT_CLIENT_ID" --arg secret "$INPUT_CLIENT_SECRET" \
              '{client_id:$id, client_secret:$secret}' > "$TOKEN_REQ_FILE"
          fi
          TOKEN_RESP=$(curl -sS --max-time 30 -X POST "${BASE_URL}/api/v1/auth/token" \
            -H 'Content-Type: application/json' --data-binary @"$TOKEN_REQ_FILE")
          rm -f "$TOKEN_REQ_FILE"
          JWT=$(echo "$TOKEN_RESP" | jq -r '.token // empty' 2>/dev/null)
          if [ -z "$JWT" ]; then
            warn "JWT token exchange failed (check client-id/client-secret)"
          fi
          AUTH="Bearer ${JWT}"
        elif [ -n "$INPUT_API_TOKEN" ]; then
          # Backend compares the value after 'Basic ' verbatim (not base64-encoded),
          # matching the CLI's own scheme; base64-encoding would break authentication.
          # Sent over HTTPS only (enforced above); never logged.
          # armis:ignore cwe:522 reason:Basic scheme requires the raw token in the header per the backend contract (verbatim hmac compare); sent over HTTPS, never echoed
          AUTH="Basic ${INPUT_API_TOKEN}"
        else
          warn "no credentials provided (set client-id/client-secret or api-token)"
        fi

        # 5. Build the request payload safely (no string interpolation of SARIF).
        if ! jq -n --arg repo "$REPO" --argjson pr "$PR_NUMBER" --slurpfile sarif "$SARIF_FILE" \
          '{repo:$repo, pr_number:$pr, sarif:$sarif[0]}' > pr-comment-payload.json 2>/dev/null; then
          warn "failed to build request payload"
        fi

        # 6. POST to the branded-comment webhook.
        HTTP_CODE=$(curl -sS --max-time 60 -o pr-comment-response.json -w '%{http_code}' \
          -X POST "${BASE_URL}/api/v1/webhook/pr-comment" \
          -H "Authorization: ${AUTH}" \
          -H 'Content-Type: application/json' \
          --data-binary @pr-comment-payload.json)
        CURL_EXIT=$?

        if [ "$CURL_EXIT" -ne 0 ]; then
          warn "request to backend failed (curl exit $CURL_EXIT)"
        fi
        if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
          DETAIL=$(jq -r '.detail // empty' pr-comment-response.json 2>/dev/null)
          warn "backend returned HTTP $HTTP_CODE${DETAIL:+ ($DETAIL)}"
        fi

        COMMENT_URL=$(jq -r '.comment_url // empty' pr-comment-response.json 2>/dev/null)
        echo "Branded PR comment posted: ${COMMENT_URL:-ok}"
